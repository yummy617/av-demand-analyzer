<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音视频需求拆解&技术可行性初判助手</title>
    <style>
        /* ==========基础样式========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6366f1;
            --primary-hover: #818cf8;
            --primary-light: rgba(99, 102, 241, 0.15);
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-input: #12121f;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            /* 【新增】优先级颜色变量 */
            --p0-color: #ef4444;
            --p0-bg: rgba(239, 68, 68, 0.15);
            --p1-color: #f59e0b;
            --p1-bg: rgba(245, 158, 11, 0.15);
            --p2-color: #22c55e;
            --p2-bg: rgba(34, 197, 94, 0.15);
            /* 【新增】风险等级颜色 */
            --risk-high: #ef4444;
            --risk-medium: #f59e0b;
            --risk-low: #22c55e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(160deg, #0a0a14 0%, #0f1020 50%, #0d1525 100%);
            min-height: 100vh;
            padding: 0;
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* ==========顶部导航栏========== */
        .navbar {
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .navbar-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .navbar-logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary-color), #a855f7);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 2px 12px rgba(99, 102, 241, 0.4);
        }

        .navbar-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .navbar-version {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            background: var(--primary-light);
            color: var(--primary-hover);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            margin-left: 8px;
        }

        .navbar-status {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ==========容器========== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .page-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* ==========主面板========== */
        .main-panel {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px;
            margin-bottom: 24px;
        }

        /* ==========卡片样式========== */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 28px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-lg);
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.2px;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: linear-gradient(180deg, var(--primary-color), #a855f7);
            border-radius: 2px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group:last-child {
            margin-bottom: 0;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        /* ==========输入框========== */
        .requirement-input {
            width: 100%;
            min-height: 240px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px;
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.7;
            resize: vertical;
            transition: all 0.25s ease;
        }

        .requirement-input:hover {
            background: rgba(18, 18, 31, 0.9);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .requirement-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--primary-light), var(--shadow-sm);
            background: rgba(18, 18, 31, 0.95);
        }

        .requirement-input::placeholder {
            color: var(--text-muted);
        }

        /* ==========业务线选择========== */
        .radio-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .radio-item {
            position: relative;
        }

        .radio-item input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .radio-item label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px 16px;
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            min-height: 100px;
        }

        .radio-item label:hover {
            border-color: rgba(99, 102, 241, 0.4);
            background: rgba(99, 102, 241, 0.05);
        }

        .radio-item input:checked + label {
            border-color: var(--primary-color);
            background: var(--primary-light);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .radio-icon-large {
            font-size: 28px;
            line-height: 1;
        }

        .radio-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: color 0.25s ease;
        }

        .radio-item input:checked + label .radio-text {
            color: var(--primary-hover);
        }

        .radio-desc {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: -4px;
        }

        /* ==========按钮========== */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
        }

        .btn:active::after {
            width: 200px;
            height: 200px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color) 0%, #8b5cf6 100%);
            color: #fff;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* ==========结果卡片========== */
        .result-card {
            grid-column: 1 / -1;
        }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .result-title-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* ==========【新增】操作按钮区域========== */
        .result-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .action-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .action-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .action-btn svg {
            width: 14px;
            height: 14px;
        }

        .result-container {
            background: var(--bg-input);
            border-radius: var(--radius-md);
            padding: 24px;
            border: 1px solid var(--border-color);
            min-height: 500px;
            max-height: 800px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .result-container::-webkit-scrollbar {
            width: 6px;
        }

        .result-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .result-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }

        .result-container::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 56px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-state-text {
            font-size: 14px;
        }

        /* ==========【修改】报告标题头部样式========== */
        .report-header {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(168, 85, 247, 0.1) 100%);
            border-radius: var(--radius-md);
            padding: 20px 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .report-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .report-main-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .report-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .report-meta-item {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .report-version-badge {
            background: var(--primary-light);
            color: var(--primary-hover);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
        }

        /* ==========【新增】四大板块样式========== */
        .report-section {
            margin-bottom: 32px;
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }

        .report-section:last-child {
            margin-bottom: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 12px;
            margin-bottom: 16px;
            border-bottom: 2px solid var(--border-color);
        }

        .section-icon {
            font-size: 20px;
            line-height: 1;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .section-divider {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border-color), transparent);
        }

        /* ==========【新增】问题清单表格样式========== */
        .problem-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .problem-table th {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 14px;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .problem-table td {
            padding: 14px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-secondary);
            vertical-align: top;
        }

        .problem-table tr:last-child td {
            border-bottom: none;
        }

        .problem-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .problem-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        /* ==========【新增】技术模块卡片样式========== */
        .tech-module-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .tech-module-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .tech-module-card:last-child {
            margin-bottom: 0;
        }

        .tech-module-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .tech-module-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tech-module-body {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .tech-module-row {
            margin-bottom: 8px;
        }

        .tech-module-row:last-child {
            margin-bottom: 0;
        }

        .tech-module-label {
            color: var(--text-muted);
            margin-right: 6px;
        }

        .tech-module-value {
            color: var(--text-secondary);
        }

        .doc-link {
            color: var(--primary-hover);
            text-decoration: none;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: opacity 0.2s;
        }

        .doc-link:hover {
            opacity: 0.8;
        }

        /* ==========【新增】风险评估样式========== */
        .risk-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-bottom: 12px;
            border-left: 3px solid;
            transition: all 0.2s ease;
        }

        .risk-card.risk-high {
            border-left-color: var(--risk-high);
            background: rgba(239, 68, 68, 0.05);
        }

        .risk-card.risk-medium {
            border-left-color: var(--risk-medium);
            background: rgba(245, 158, 11, 0.05);
        }

        .risk-card.risk-low {
            border-left-color: var(--risk-low);
            background: rgba(34, 197, 94, 0.05);
        }

        .risk-card:last-child {
            margin-bottom: 0;
        }

        .risk-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .risk-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .risk-badges {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .risk-level-badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .risk-level-badge.high {
            background: var(--p0-bg);
            color: var(--p0-color);
        }

        .risk-level-badge.medium {
            background: var(--p1-bg);
            color: var(--p1-color);
        }

        .risk-level-badge.low {
            background: var(--p2-bg);
            color: var(--p2-color);
        }

        .feasibility-badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary-hover);
        }

        .risk-explanation {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* ==========【新增】优化建议样式========== */
        .suggestion-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
        }

        .suggestion-card:last-child {
            margin-bottom: 0;
        }

        .suggestion-header {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .suggestion-list {
            list-style: none;
        }

        .suggestion-item {
            font-size: 13px;
            color: var(--text-secondary);
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: flex-start;
            gap: 8px;
            line-height: 1.6;
        }

        .suggestion-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .suggestion-num {
            background: var(--primary-light);
            color: var(--primary-hover);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .suggestion-arrow {
            color: var(--primary-hover);
            margin: 0 4px;
        }

        /* ==========【新增】评审结论样式========== */
        .conclusion-card {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1) 0%, rgba(99, 102, 241, 0.1) 100%);
            border-radius: var(--radius-md);
            padding: 20px 24px;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .conclusion-header {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .conclusion-body {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .conclusion-highlight {
            color: #4ade80;
            font-weight: 600;
        }

        /* ==========优先级标签========== */
        .priority-tag {
            display: inline-flex;
            align-items: center;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .priority-p0 {
            background: var(--p0-bg);
            color: var(--p0-color);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .priority-p1 {
            background: var(--p1-bg);
            color: var(--p1-color);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .priority-p2 {
            background: var(--p2-bg);
            color: var(--p2-color);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        /* ==========关键词标签========== */
        .keyword-tag {
            display: inline-block;
            padding: 6px 14px;
            background: var(--primary-light);
            color: var(--primary-hover);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin: 4px;
            border: 1px solid rgba(99, 102, 241, 0.2);
            transition: all 0.2s ease;
        }

        .keyword-tag:hover {
            background: rgba(99, 102, 241, 0.25);
            transform: translateY(-1px);
        }

        /* ==========可行性统计========== */
        .feasibility-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-sm);
            padding: 14px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .stat-number {

        // ====== 分析逻辑（核心逻辑不变，扩展输出）======
        let currentResult = null;
        let analysisProgress = 0;

        function analyze() {
            const requirement = document.getElementById('requirementInput').value.trim();
            const business = document.querySelector('input[name="business"]:checked').value;
            
            if (!requirement) {
                showToast('请输入需求描述');
                return;
            }

            const resultContainer = document.getElementById('resultContainer');
            resultContainer.innerHTML = `
                <div class="loading show" id="loadingSection">
                    <div class="loading-spinner"></div>
                    <div class="loading-progress" id="loadingProgress">0%</div>
                    <div class="loading-text">正在分析需求...</div>
                </div>
            `;

            // 【新增】带百分比的加载动画
            analysisProgress = 0;
            const progressInterval = setInterval(() => {
                analysisProgress += Math.random() * 15;
                if (analysisProgress > 95) analysisProgress = 95;
                document.getElementById('loadingProgress').textContent = Math.floor(analysisProgress) + '%';
            }, 100);

            setTimeout(() => {
                clearInterval(progressInterval);
                document.getElementById('loadingProgress').textContent = '100%';
                
                setTimeout(() => {
                    currentResult = performAnalysis(requirement, business);
                    renderResult(currentResult);
                    updateButtons(true);
                }, 200);
            }, 1500);
        }

        function performAnalysis(requirement, business) {
            const rules = RULES_DATABASE[business];
            const results = {
                business: rules.name,
                timestamp: new Date().toLocaleString('zh-CN'),
                version: 'v1.2',
                matchedCategories: [],
                allKeywords: [],
                allModules: [],
                priorities: { P0: [], P1: [], P2: [] },
                feasibility: { high: [], medium: [], low: [] },
                fullReport: '',
                mdReport: ''
            };

            for (const [category, data] of Object.entries(rules.categories)) {
                const matchedKeywords = data.keywords.filter(kw => 
                    requirement.toLowerCase().includes(kw.toLowerCase())
                );

                if (matchedKeywords.length > 0) {
                    results.matchedCategories.push({
                        name: category,
                        keywords: matchedKeywords,
                        modules: data.modules,
                        feasibility: data.feasibility,
                        priority: data.priority,
                        notes: data.notes,
                        // 扩展字段
                        impactScope: data.impactScope || '全平台用户',
                        scenarios: data.scenarios || '通用场景',
                        userImpact: data.userImpact || '影响用户体验',
                        techPrinciple: data.techPrinciple || '技术实现方案',
                        projectSupport: data.projectSupport || '项目支持情况待确认',
                        dependencies: data.dependencies || '依赖条件待确认',
                        suggestions: data.suggestions || ['建议进行详细技术评估']
                    });

                    results.allKeywords.push(...matchedKeywords);
                    results.allModules.push(...data.modules);
                    results.priorities[data.priority].push(category);
                    results.feasibility[data.feasibility].push(category);
                }
            }

            results.allKeywords = [...new Set(results.allKeywords)];
            results.allModules = [...new Set(results.allModules)];

            // 生成完整报告
            results.fullReport = generateFullReport(results, requirement);
            results.mdReport = generateMarkdownReport(results, requirement);

            return results;
        }

        // 【新增】生成完整报告（四大板块）
        function generateFullReport(results, requirement) {
            const lines = [];
            
            // 报告头部
            lines.push(`╔══════════════════════════════════════════════════════════════╗`);
            lines.push(`║          音视频需求技术可行性初判报告                        ║`);
            lines.push(`╚══════════════════════════════════════════════════════════════╝`);
            lines.push('');
            lines.push(`项目标题：音视频需求分析`);
            lines.push(`生成时间：${results.timestamp}`);
            lines.push(`版本号：${results.version}`);
            lines.push(`业务线：${results.business}`);
            lines.push('');
            lines.push(`${'─'.repeat(60)}`);
            lines.push('');

            // 板块一：核心问题清单
            lines.push(`📌 核心问题清单`);
            lines.push(`${'─'.repeat(60)}`);
            if (results.matchedCategories.length === 0) {
                lines.push('未识别到明确的技术问题，建议人工复核需求描述。');
            } else {
                results.matchedCategories.forEach((cat, idx) => {
                    lines.push('');
                    lines.push(`问题${idx + 1}：${cat.name}`);
                    lines.push(`  ├─ 影响范围：${cat.impactScope}`);
                    lines.push(`  ├─ 出现场景：${cat.scenarios}`);
                    lines.push(`  ├─ 用户影响：${cat.userImpact}`);
                    lines.push(`  └─ 优先级：${cat.priority}`);
                });
            }
            lines.push('');

            // 板块二：技术模块拆解
            lines.push(`🔧 技术模块拆解`);
            lines.push(`${'─'.repeat(60)}`);
            if (results.matchedCategories.length === 0) {
                lines.push('未匹配到技术模块，建议进行人工技术评估。');
            } else {
                results.matchedCategories.forEach((cat, idx) => {
                    lines.push('');
                    lines.push(`模块${idx + 1}：${cat.name}`);
                    lines.push(`  ├─ 技术原理：${cat.techPrinciple}`);
                    lines.push(`  ├─ 当前项目支持：${cat.projectSupport}`);
                    lines.push(`  ├─ 依赖条件：${cat.dependencies}`);
                    lines.push(`  └─ 关键技术点：${cat.modules.join('、')}`);
                });
            }
            lines.push('');

            // 板块三：风险与可行性评估
            lines.push(`⚠️ 风险与可行性评估`);
            lines.push(`${'─'.repeat(60)}`);
            if (results.matchedCategories.length === 0) {
                lines.push('暂无风险评估数据。');
            } else {
                results.matchedCategories.forEach((cat, idx) => {
                    const riskLevel = cat.feasibility === 'high' ? '低' : (cat.feasibility === 'medium' ? '中' : '高');
                    const feasibilityPercent = cat.feasibility === 'high' ? '90%' : (cat.feasibility === 'medium' ? '70%' : '40%');
                    lines.push('');
                    lines.push(`风险项${idx + 1}：${cat.name}`);
                    lines.push(`  ├─ 风险等级：${riskLevel}`);
                    lines.push(`  ├─ 可行性：${feasibilityPercent}`);
                    lines.push(`  └─ 可行性说明：${cat.notes}`);
                });
            }
            lines.push('');

            // 板块四：落地优化建议
            lines.push(`💡 落地优化建议`);
            lines.push(`${'─'.repeat(60)}`);
            if (results.matchedCategories.length === 0) {
                lines.push('建议：');
                lines.push('  1. 检查需求描述是否清晰完整');
                lines.push('  2. 确认是否属于当前业务线范围');
                lines.push('  3. 联系技术团队进行人工评估');
            } else {
                results.matchedCategories.forEach((cat, idx) => {
                    lines.push('');
                    lines.push(`【${cat.name}】优化建议：`);
                    cat.suggestions.forEach((sug, sidx) => {
                        lines.push(`  ${sidx + 1}. ${sug}`);
                    });
                });
            }
            lines.push('');

            // 评审结论
            lines.push(`📊 评审结论`);
            lines.push(`${'─'.repeat(60)}`);
            const totalHigh = results.feasibility.high.length;
            const totalMedium = results.feasibility.medium.length;
            const totalLow = results.feasibility.low.length;
            const total = totalHigh + totalMedium + totalLow;
            
            if (total === 0) {
                lines.push('结论：需求待确认，建议补充详细描述后重新分析。');
            } else {
                const overallFeasibility = totalHigh >= total * 0.6 ? '整体可行性高' : 
                                          (totalMedium >= total * 0.5 ? '整体可行性中等' : '整体可行性需评估');
                lines.push(`结论：${overallFeasibility}`);
                lines.push('');
                lines.push(`可行性分布：`);
                lines.push(`  ├─ 高可行性：${totalHigh}项（${total > 0 ? Math.round(totalHigh/total*100) : 0}%）`);
                lines.push(`  ├─ 中可行性：${totalMedium}项（${total > 0 ? Math.round(totalMedium/total*100) : 0}%）`);
                lines.push(`  └─ 低可行性：${totalLow}项（${total > 0 ? Math.round(totalLow/total*100) : 0}%）`);
                lines.push('');
                lines.push(`优先级排序：`);
                lines.push(`  P0核心：${results.priorities.P0.join('、') || '无'}`);
                lines.push(`  P1重要：${results.priorities.P1.join('、') || '无'}`);
                lines.push(`  P2一般：${results.priorities.P2.join('、') || '无'}`);
            }
            lines.push('');
            lines.push(`${'─'.repeat(60)}`);
            lines.push('免责声明：本报告由AI自动生成，仅供参考，不构成技术承诺。');
            lines.push('最终技术方案以技术团队评审结果为准。');
            lines.push(`${'─'.repeat(60)}`);

            return lines.join('\n');
        }

                    lines.push('');
                    lines.push(`**参考文档**：[了解更多](#) *（占位链接，待补充）*`);
                    lines.push('');
                });
            }
            lines.push('---');
            lines.push('');

            // 风险与可行性评估
            lines.push(`## ⚠️ 风险与可行性评估`);
            lines.push('');
            if (results.matchedCategories.length === 0) {
                lines.push(`> 暂无风险评估数据。`);
            } else {
                results.matchedCategories.forEach((cat, idx) => {
                    const riskLevel = cat.feasibility === 'high' ? '低' : (cat.feasibility === 'medium' ? '中' : '高');
                    const feasibilityPercent = cat.feasibility === 'high' ? '90%' : (cat.feasibility === 'medium' ? '70%' : '40%');
                    lines.push(`### ${idx + 1}. ${cat.name}`);
                    lines.push('');
                    lines.push(`| 风险等级 | 可行性 | 可行性说明 |`);
                    lines.push(`|:--------:|:------:|:----------|`);
                    lines.push(`| \`${riskLevel}\` | \`${feasibilityPercent}\` | ${cat.notes} |`);
                    lines.push('');
                });
            }
            lines.push('---');
            lines.push('');

            // 落地优化建议
            lines.push(`## 💡 落地优化建议`);
            lines.push('');
            if (results.matchedCategories.length === 0) {
                lines.push(`建议进行以下步骤：`);
                lines.push(`1. 检查需求描述是否清晰完整`);
                lines.push(`2. 确认是否属于当前业务线范围`);
                lines.push(`3. 联系技术团队进行人工评估`);
            } else {
                results.matchedCategories.forEach((cat, idx) => {
                    lines.push(`### ${idx + 1}. ${cat.name}`);
                    lines.push('');
                    cat.suggestions.forEach((sug, sidx) => {
                        lines.push(`${sidx + 1}. ${sug}`);
                    });
                    lines.push('');
                });
            }
            lines.push('---');
            lines.push('');

            // 评审结论
            lines.push(`## 📊 评审结论`);
            lines.push('');
            const totalHigh = results.feasibility.high.length;
            const totalMedium = results.feasibility.medium.length;
            const totalLow = results.feasibility.low.length;
            const total = totalHigh + totalMedium + totalLow;
            
            if (total === 0) {
                lines.push(`> **结论**：需求待确认，建议补充详细描述后重新分析。`);
            } else {
                const overallFeasibility = totalHigh >= total * 0.6 ? '✅ 整体可行性高' : 
                                          (totalMedium >= total * 0.5 ? '⚠️ 整体可行性中等' : '🔴 整体可行性需评估');
                lines.push(`> **结论**：${overallFeasibility}`);
                lines.push('');
                lines.push(`**可行性分布**：`);
                lines.push(`- 高可行性：${totalHigh}项（${total > 0 ? Math.round(totalHigh/total*100) : 0}%）`);
                lines.push(`- 中可行性：${totalMedium}项（${total > 0 ? Math.round(totalMedium/total*100) : 0}%）`);
                lines.push(`- 低可行性：${totalLow}项（${total > 0 ? Math.round(totalLow/total*100) : 0}%）`);
                lines.push('');
                lines.push(`**优先级排序**：`);
                lines.push(`- \`P0\` 核心：${results.priorities.P0.join('、') || '无'}`);
                lines.push(`- \`P1\` 重要：${results.priorities.P1.join('、') || '无'}`);
                lines.push(`- \`P2\` 一般：${results.priorities.P2.join('、') || '无'}`);
            }
            lines.push('');
            lines.push('---');
            lines.push('');
            lines.push(`*免责声明：本报告由AI自动生成，仅供参考，不构成技术承诺。最终技术方案以技术团队评审结果为准。*`);

            return lines.join('\n');
        }

        // 【修改】渲染结果（四大板块布局）
        function renderResult(result) {
            const container = document.getElementById('resultContainer');
            document.getElementById('analysisTime').textContent = result.timestamp;

            if (result.matchedCategories.length === 0) {
                container.innerHTML = `
                    <div class="report-section" style="animation-delay: 0s;">
                        <div class="section-header">
                            <span class="section-icon">📌</span>
                            <span class="section-title">分析结果</span>
                        </div>
                        <p style="color: #fbbf24; font-size: 14px; padding: 20px;">
                            未匹配到已知功能模块，请检查需求描述或联系技术团队进行人工评估。
                        </p>
                    </div>
                `;
                return;
            }

            const totalHigh = result.feasibility.high.length;
            const totalMedium = result.feasibility.medium.length;
            const totalLow = result.feasibility.low.length;
            const total = totalHigh + totalMedium + totalLow;

            let html = `
                <!-- 报告头部 -->
                <div class="report-header" style="animation-delay: 0s;">
                    <div class="report-title-row">
                        <div class="report-main-title">
                            <span>📋</span> 音视频需求技术可行性初判报告
                        </div>
                        <div class="report-meta">
                            <span class="report-meta-item">📅 ${result.timestamp}</span>
                            <span class="report-version-badge">${result.version}</span>
                        </div>
                    </div>
                </div>

                <!-- 板块一：核心问题清单 -->
                <div class="report-section" style="animation-delay: 0.1s;">
                    <div class="section-header">
                        <span class="section-icon">📌</span>
                        <span class="section-title">核心问题清单</span>
                        <div class="section-divider"></div>
                    </div>
                    <table class="problem-table">
                        <thead>
                            <tr>
                                <th style="width: 30%">问题名称</th>
                                <th style="width: 18%">影响范围</th>
                                <th style="width: 22%">出现场景</th>
                                <th style="width: 22%">用户影响</th>
                                <th style="width: 8%">优先级</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${result.matchedCategories.map((cat, idx) => `
                                <tr>
                                    <td class="problem-name">${cat.name}</td>
                                    <td>${cat.impactScope}</td>
                                    <td>${cat.scenarios}</td>
                                    <td>${cat.userImpact}</td>
                                    <td><span class="priority-tag priority-${cat.priority.toLowerCase()}">${cat.priority}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>

                <!-- 板块二：技术模块拆解 -->
                <div class="report-section" style="animation-delay: 0.2s;">
                    <div class="section-header">
                        <span class="section-icon">🔧</span>
                        <span class="section-title">技术模块拆解</span>
                        <div class="section-divider"></div>
                    </div>
                    ${result.matchedCategories.map((cat, idx) => `
                        <div class="tech-module-card">
                            <div class="tech-module-header">
                                <span class="tech-module-name">
                                    ${idx + 1}. ${cat.name}
                                    <span class="priority-tag priority-${cat.priority.toLowerCase()}">${cat.priority}</span>
                                </span>
                            </div>
                            <div class="tech-module-body">
                                <div class="tech-module-row">
                                    <span class="tech-module-label">技术原理：</span>
                                    <span class="tech-module-value">${cat.techPrinciple}</span>
                                </div>
                                <div class="tech-module-row">
                                    <span class="tech-module-label">当前项目支持：</span>
                                    <span class="tech-module-value">${cat.projectSupport}</span>
                                </div>
                                <div class="tech-module-row">
                                    <span class="tech-module-label">依赖条件：</span>
                                    <span class="tech-module-value">${cat.dependencies}</span>
                                </div>
                                <div class="tech-module-row">
                                    <span class="tech-module-label">关键技术点：</span>
                                    <span class="tech-module-value">${cat.modules.join('、')}</span>
                                </div>
                                <div class="tech-module-row">
                                    <span class="tech-module-label">参考文档：</span>
                                    <a href="#" class="doc-link" onclick="event.preventDefault()">[了解更多] ↗</a>
                                    <span style="color: var(--text-muted); font-size: 11px;">（占位链接）</span>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>

                <!-- 板块三：风险与可行性评估 -->
                <div class="report-section" style="animation-delay: 0.3s;">
                    <div class="section-header">
                        <span class="section-icon">⚠️</span>
                        <span class="section-title">风险与可行性评估</span>
                        <div class="section-divider"></div>
                    </div>
                    <div class="feasibility-stats">
                        <div class="stat-card">
                            <div class="stat-number high">${totalHigh}</div>
                            <div class="stat-label">高可行性</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number medium">${totalMedium}</div>
                            <div class="stat-label">中等可行性</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number low">${totalLow}</div>
                            <div class="stat-label">低可行性</div>
                        </div>
                    </div>
                    ${result.matchedCategories.map((cat, idx) => {
                        const riskLevel = cat.feasibility === 'high' ? '低' : (cat.feasibility === 'medium' ? '中' : '高');
                        const riskClass = cat.feasibility === 'high' ? 'low' : (cat.feasibility === 'medium' ? 'medium' : 'high');
                        const feasibilityPercent = cat.feasibility === 'high' ? '90%' : (cat.feasibility === 'medium' ? '70%' : '40%');
                        return `
                            <div class="risk-card risk-${riskClass}">
                                <div class="risk-header">
                                    <span class="risk-name">${cat.name}</span>
                                    <div class="risk-badges">
                                        <span class="risk-level-badge ${riskClass}">风险：${riskLevel}</span>
                                        <span class="feasibility-badge">可行性：${feasibilityPercent}</span>
                                    </div>
                                </div>
                                <div class="risk-explanation">${cat.notes}</div>
                            </div>
                        `;
                    }).join('')}
                </div>

                <!-- 板块四：落地优化建议 -->
                <div class="report-section" style="animation-delay: 0.4s;">
                    <div class="section-header">
                        <span class="section-icon">💡</span>
                        <span class="section-title">落地优化建议</span>
                        <div class="section-divider"></div>
                    </div>
                    ${result.matchedCategories.map((cat, idx) => `
                        <div class="suggestion-card">
                            <div class="suggestion-header">
                                <span>🎯</span> ${cat.name}
                            </div>
                            <ul class="suggestion-list">
                                ${cat.suggestions.map((sug, sidx) => `
                                    <li class="suggestion-item">
                                        <span class="suggestion-num">${sidx + 1}</span>
                                        <span>${sug}</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    `).join('')}
                </div>

                <!-- 评审结论 -->
                <div class="report-section" style="animation-delay: 0.5s;">
                    <div class="section-header">
                        <span class="section-icon">📊</span>
                        <span class="section-title">评审结论</span>
                        <div class="section-divider"></div>
                    </div>
                    <div class="conclusion-card">
                        <div class="conclusion-header">
                            <span>✅</span> 整体评估结论
                        </div>
                        <div class="conclusion-body">
                            ${(() => {
                                const overallFeasibility = totalHigh >= total * 0.6 ? '整体可行性高，技术方案成熟，建议进入详细设计阶段。' : 
                                                          (totalMedium >= total * 0.5 ? '整体可行性中等，部分模块需技术预研，建议先进行可行性验证。' : '整体可行性需评估，建议调整需求方案或进行专项技术攻关。');
                                return `
                                    <p>经初步分析，识别到 <span class="conclusion-highlight">${result.matchedCategories.length}</span> 个技术问题，
                                    其中 <span class="conclusion-highlight">P0核心 ${result.priorities.P0.length}</span> 项、
                                    <span class="conclusion-highlight">P1重要 ${result.priorities.P1.length}</span> 项、
                                    <span class="conclusion-highlight">P2一般 ${result.priorities.P2.length}</span> 项。</p>
                                    <p style="margin-top: 12px;">${overallFeasibility}</p>
                                `;
                            })()}
                        </div>
                    </div>
                </div>
            `;

            container.innerHTML = html;
            
            // 【新增】自动滚动到顶部
            container.scrollTop = 0;
        }

        function updateButtons(hasResult) {
            document.getElementById('copyBtn').disabled = !hasResult;
            document.getElementById('exportTxtBtn').disabled = !hasResult;
            document.getElementById('exportMdBtn').disabled = !hasResult;
        }

        // 【修改】复制报告
        function copyReport() {
            if (!currentResult) return;
            
            navigator.clipboard.writeText(currentResult.fullReport).then(() => {
                showToast('复制成功');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = currentResult.fullReport;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('复制成功');
            });
        }

        // 【修改】导出报告
        function exportReport(format) {
            if (!currentResult) return;
            
            let content, filename, mimeType;
            
            if (format === 'txt') {
                content = currentResult.fullReport;
                filename = `技术评审报告_${currentResult.timestamp.replace(/[/:]/g, '-')}.txt`;
                mimeType = 'text/plain;charset=utf-8';
            } else if (format === 'md') {
                content = currentResult.mdReport;
                filename = `技术评审报告_${currentResult.timestamp.replace(/[/:]/g, '-')}.md`;
                mimeType = 'text/markdown;charset=utf-8';
            }
            
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('报告已导出');
        }

        function clearAll() {
            document.getElementById('requirementInput').value = '';
            document.getElementById('resultContainer').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <div class="empty-state-text">请输入需求并点击「开始分析」按钮</div>
                </div>
            `;
            document.getElementById('analysisTime').textContent = '';
            currentResult = null;
            updateButtons(false);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = '✓ ' + message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 回车快捷键
        document.getElementById('requirementInput').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                analyze();
            }
        });
    </script>
</body>
</html>
