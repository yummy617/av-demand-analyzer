<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音视频需求拆解&技术可行性初判助手</title>
    <style>
        /* ==========【修改】基础样式优化：增加页面内边距，优化字体层级========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* 【新增】CSS变量定义，统一管理主题色 */
            --primary-color: #6366f1;
            --primary-hover: #818cf8;
            --primary-light: rgba(99, 102, 241, 0.15);
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-input: #12121f;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(160deg, #0a0a14 0%, #0f1020 50%, #0d1525 100%);
            min-height: 100vh;
            padding: 0; /* 【修改】移除body内边距，改为container控制 */
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* ==========【新增】顶部导航栏========== */
        .navbar {
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .navbar-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .navbar-logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary-color), #a855f7);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 2px 12px rgba(99, 102, 241, 0.4);
        }

        .navbar-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .navbar-version {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            background: var(--primary-light);
            color: var(--primary-hover);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            margin-left: 8px;
        }

        .navbar-status {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ==========【修改】容器优化：增加内边距和最大宽度========== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 24px; /* 【修改】增加内边距 */
        }

        /* ==========【删除】旧版header样式，改为简洁标题区========== */
        .page-header {
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .page-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* ==========【修改】主面板优化：增加卡片间距========== */
        .main-panel {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px; /* 【修改】增加间距 */
            margin-bottom: 24px;
        }

        /* ==========【修改】卡片样式优化：增加阴影和圆角========== */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 28px; /* 【修改】增加内边距 */
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-lg);
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.2px;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: linear-gradient(180deg, var(--primary-color), #a855f7);
            border-radius: 2px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group:last-child {
            margin-bottom: 0;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        /* ==========【修改】输入框优化：增加圆角、聚焦高亮、背景变化========== */
        .requirement-input {
            width: 100%;
            min-height: 240px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px;
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.7;
            resize: vertical;
            transition: all 0.25s ease;
        }

        .requirement-input:hover {
            background: rgba(18, 18, 31, 0.9);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .requirement-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--primary-light), var(--shadow-sm);
            background: rgba(18, 18, 31, 0.95);
        }

        .requirement-input::placeholder {
            color: var(--text-muted);
        }

        /* ==========【修改】业务线选择：改为卡片式单选按钮========== */
        .radio-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .radio-item {
            position: relative;
        }

        .radio-item input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .radio-item label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px 16px;
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            min-height: 100px;
        }

        .radio-item label:hover {
            border-color: rgba(99, 102, 241, 0.4);
            background: rgba(99, 102, 241, 0.05);
        }

        .radio-item input:checked + label {
            border-color: var(--primary-color);
            background: var(--primary-light);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .radio-icon-large {
            font-size: 28px;
            line-height: 1;
        }

        .radio-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: color 0.25s ease;
        }

        .radio-item input:checked + label .radio-text {
            color: var(--primary-hover);
        }

        .radio-desc {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: -4px;
        }

        /* ==========【修改】按钮优化：悬停效果、点击反馈========== */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
        }

        .btn:active::after {
            width: 200px;
            height: 200px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color) 0%, #8b5cf6 100%);
            color: #fff;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* ==========【修改】结果卡片优化========== */
        .result-card {
            grid-column: 1 / -1;
        }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .result-title-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* ==========【新增】操作按钮区域（右上角）========== */
        .result-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .action-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .action-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .action-btn svg {
            width: 14px;
            height: 14px;
        }

        .result-container {
            background: var(--bg-input);
            border-radius: var(--radius-md);
            padding: 24px;
            border: 1px solid var(--border-color);
            min-height: 400px;
            max-height: 700px;
            overflow-y: auto;
        }

        .result-container::-webkit-scrollbar {
            width: 6px;
        }

        .result-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .result-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }

        .result-container::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 56px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-state-text {
            font-size: 14px;
        }

        /* ==========【修改】结果展示区：卡片式布局，分模块展示========== */
        .result-section {
            margin-bottom: 28px;
            animation: fadeInUp 0.4s ease forwards;
        }

        .result-section:last-child {
            margin-bottom: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-section-title .icon {
            font-size: 16px;
        }

        /* ==========【修改】关键词标签优化========== */
        .keyword-tag {
            display: inline-block;
            padding: 6px 14px;
            background: var(--primary-light);
            color: var(--primary-hover);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin: 4px;
            border: 1px solid rgba(99, 102, 241, 0.2);
            transition: all 0.2s ease;
        }

        .keyword-tag:hover {
            background: rgba(99, 102, 241, 0.25);
            transform: translateY(-1px);
        }

        /* ==========【修改】优先级标签优化========== */
        .priority-tag {
            display: inline-flex;
            align-items: center;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }

        .priority-p0 {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .priority-p1 {
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .priority-p2 {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        /* ==========【修改】模块列表优化========== */
        .module-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .module-item {
            padding: 10px 16px;
            background: rgba(168, 85, 247, 0.1);
            color: #c084fc;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            border: 1px solid rgba(168, 85, 247, 0.2);
            transition: all 0.2s ease;
            cursor: default;
        }

        .module-item:hover {
            background: rgba(168, 85, 247, 0.15);
            border-color: rgba(168, 85, 247, 0.3);
        }

        /* ==========【修改】可行性评估区优化========== */
        .feasibility-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-sm);
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .feasibility-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .feasibility-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .feasibility-item:first-child {
            padding-top: 0;
        }

        .feasibility-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .feasibility-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .status-high { color: #4ade80; }
        .status-medium { color: #fbbf24; }
        .status-low { color: #f87171; }

        .status-dot-lg {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: currentColor;
        }

        /* ==========【修改】优先级分布区优化========== */
        .priority-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .priority-card {
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
        }

        .priority-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .priority-card-content {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* ==========【修改】技术模块清单优化========== */
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px;
        }

        .module-grid-item {
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .module-grid-item .num {
            color: var(--text-muted);
            font-weight: 500;
            min-width: 20px;
        }

        /* ==========【修改】报告汇总区优化========== */
        .summary-box {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.08) 0%, rgba(168, 85, 247, 0.08) 100%);
            border-radius: var(--radius-md);
            padding: 24px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .summary-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .summary-content {
            font-size: 13px;
            line-height: 1.8;
            white-space: pre-wrap;
            color: var(--text-secondary);
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
        }

        /* ==========【修改】Toast提示优化========== */
        .toast {
            position: fixed;
            top: 80px;
            right: 24px;
            padding: 14px 24px;
            background: rgba(34, 197, 94, 0.95);
            color: #fff;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 0 8px 24px rgba(34, 197, 94, 0.3);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }

        /* ==========【修改】Loading状态优化========== */
        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 60px;
            color: var(--text-muted);
        }

        .loading.show {
            display: flex;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 14px;
        }

        .info-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: var(--primary-light);
            color: var(--primary-hover);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }

        /* ==========【修改】响应式布局优化========== */
        @media (max-width: 1100px) {
            .main-panel {
                grid-template-columns: 1fr;
            }

            .navbar-title {
                font-size: 14px;
            }

            .navbar-status {
                display: none;
            }

            .priority-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .container {
                padding: 20px 16px;
            }

            .card {
                padding: 20px;
            }

            .navbar-inner {
                height: 56px;
                padding: 0 16px;
            }

            .page-title {
                font-size: 20px;
            }

            .radio-group {
                grid-template-columns: 1fr;
            }

            .radio-item label {
                flex-direction: row;
                justify-content: flex-start;
                min-height: auto;
                padding: 16px;
            }

            .result-actions {
                flex-direction: column;
                width: 100%;
            }

            .action-btn {
                justify-content: center;
            }

            .btn-group {
                flex-direction: column;
            }

            .result-container {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- 【新增】顶部导航栏 -->
    <nav class="navbar">
        <div class="navbar-inner">
            <div class="navbar-brand">
                <div class="navbar-logo">🎬</div>
                <span class="navbar-title">音视频需求拆解助手</span>
                <span class="navbar-version">v2.0</span>
            </div>
            <div class="navbar-status">
                <div class="status-item">
                    <span class="status-dot"></span>
                    <span>规则库已就绪</span>
                </div>
                <div class="status-item">
                    <span>直播 · 可灵AI</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- 【修改】简化页面标题区 -->
        <div class="page-header">
            <h1 class="page-title">需求分析与技术可行性初判</h1>
            <p class="page-subtitle">基于关键词规则库，自动拆解需求、匹配技术模块、评估可行性</p>
        </div>

        <div class="main-panel">
            <div class="card">
                <div class="card-title">需求输入</div>
                <div class="input-group">
                    <label>请输入需求描述（支持 Ctrl+Enter 快捷分析）</label>

        // ====== 分析逻辑（未修改）======
        let currentResult = null;

        function analyze() {
            const requirement = document.getElementById('requirementInput').value.trim();
            const business = document.querySelector('input[name="business"]:checked').value;
            
            if (!requirement) {
                showToast('请输入需求描述');
                return;
            }

            const resultContainer = document.getElementById('resultContainer');
            resultContainer.innerHTML = `
                <div class="loading show">
                    <div class="spinner"></div>
                    <span class="loading-text">正在分析需求...</span>
                </div>
            `;

            setTimeout(() => {
                currentResult = performAnalysis(requirement, business);
                renderResult(currentResult);
                updateButtons(true);
            }, 800);
        }

        function performAnalysis(requirement, business) {
            const rules = RULES_DATABASE[business];
            const results = {
                business: rules.name,
                timestamp: new Date().toLocaleString('zh-CN'),
                matchedCategories: [],
                allKeywords: [],
                allModules: [],
                priorities: { P0: [], P1: [], P2: [] },
                feasibility: { high: [], medium: [], low: [] },
                summary: ''
            };

            // 匹配关键词
            for (const [category, data] of Object.entries(rules.categories)) {
                const matchedKeywords = data.keywords.filter(kw => 
                    requirement.toLowerCase().includes(kw.toLowerCase())
                );

                if (matchedKeywords.length > 0) {
                    results.matchedCategories.push({
                        name: category,
                        keywords: matchedKeywords,
                        modules: data.modules,
                        feasibility: data.feasibility,
                        priority: data.priority,
                        notes: data.notes
                    });

                    results.allKeywords.push(...matchedKeywords);
                    results.allModules.push(...data.modules);
                    results.priorities[data.priority].push(category);
                    results.feasibility[data.feasibility].push(category);
                }
            }

            // 去重
            results.allKeywords = [...new Set(results.allKeywords)];
            results.allModules = [...new Set(results.allModules)];

            // 生成总结
            results.summary = generateSummary(requirement, results, business);

            return results;
        }

        function generateSummary(requirement, results, business) {
            const lines = [];
            
            lines.push(`【需求分析报告】`);
            lines.push(`业务线：${results.business}`);
            lines.push(`分析时间：${results.timestamp}`);
            lines.push('');
            lines.push(`【识别关键词】`);
            lines.push(results.allKeywords.length > 0 ? results.allKeywords.join('、') : '未识别到关键词');
            lines.push('');
            lines.push(`【匹配功能模块】`);
            lines.push(results.matchedCategories.map(c => `${c.name}(${c.priority})`).join('、') || '未匹配到模块');
            lines.push('');
            lines.push(`【优先级评估】`);
            lines.push(`P0(核心)：${results.priorities.P0.join('、') || '无'}`);
            lines.push(`P1(重要)：${results.priorities.P1.join('、') || '无'}`);
            lines.push(`P2(一般)：${results.priorities.P2.join('、') || '无'}`);
            lines.push('');
            lines.push(`【可行性判断】`);
            lines.push(`高可行性：${results.feasibility.high.join('、') || '无'}`);
            lines.push(`中可行性：${results.feasibility.medium.join('、') || '无'}`);
            lines.push(`低可行性：${results.feasibility.low.join('、') || '无'}`);
            lines.push('');
            lines.push(`【技术模块清单】`);
            results.allModules.forEach((m, i) => lines.push(`${i + 1}. ${m}`));
            lines.push('');
            lines.push(`【风险提示】`);
            
            if (results.feasibility.medium.length > 0) {
                lines.push(`⚠️ ${results.feasibility.medium.join('、')}模块可行性为中等，需进一步评估技术方案和性能影响。`);
            }
            if (results.feasibility.low.length > 0) {
                lines.push(`🔴 ${results.feasibility.low.join('、')}模块可行性较低，建议提前进行技术预研或调整需求方案。`);
            }
            if (results.feasibility.medium.length === 0 && results.feasibility.low.length === 0) {
                lines.push(`✅ 整体可行性高，技术方案成熟。`);
            }
            lines.push('');
            lines.push(`【建议】`);
            if (results.matchedCategories.length === 0) {
                lines.push('未匹配到已知功能模块，建议：');
                lines.push('1. 检查需求描述是否清晰完整');
                lines.push('2. 确认是否属于当前业务线范围');
                lines.push('3. 联系技术团队进行人工评估');
            } else {
                lines.push('1. 优先处理P0级核心功能');
                lines.push('2. 对中等可行性模块进行技术预研');
                lines.push('3. 制定详细的技术方案和排期');
                lines.push('4. 建立质量监控和验收标准');
            }

            return lines.join('\n');
        }

        // 【修改】结果渲染优化：卡片式布局

            let html = `

                <div class="result-section" style="animation-delay: 0.3s;">

                            <span class="feasibility-label">低可行性</span>

                                <span class="status-dot-lg"></span> ${result.feasibility.low.length} 项
                            </span>

                    </div>
                </div>

                <div class="result-section" style="animation-delay: 0.4s;">
                    <div class="result-section-title"><span class="icon">📋</span> 技术模块清单</div>
                    <div class="module-grid">
                        ${result.allModules.map((m, i) => `<div class="module-grid-item"><span class="num">${i + 1}.</span> ${m}</div>`).join('')}
                    </div>
                </div>

                <div class="result-section" style="animation-delay: 0.5s;">
                    <div class="summary-box">
                        <div class="summary-header">📄 完整分析报告</div>
                        <div class="summary-content">${result.summary}</div>

            `;

            container.innerHTML = html;
        }

        function updateButtons(hasResult) {
            document.getElementById('copyBtn').disabled = !hasResult;
            document.getElementById('exportBtn').disabled = !hasResult;
        }

        function copyReport() {
            if (!currentResult) return;
            
            navigator.clipboard.writeText(currentResult.summary).then(() => {
                showToast('已复制到剪贴板');
            }).catch(() => {
                // 降级方案
                const textarea = document.createElement('textarea');
                textarea.value = currentResult.summary;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('已复制到剪贴板');
            });
        }

        function exportReport() {
            if (!currentResult) return;
            
            const blob = new Blob([currentResult.summary], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `需求分析报告_${currentResult.timestamp.replace(/[/:]/g, '-')}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('报告已导出');
        }

            document.getElementById('requirementInput').value = '';
            document.getElementById('resultContainer').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <div class="empty-state-text">请输入需求并点击「开始分析」按钮</div>
                </div>
            `;
            document.getElementById('analysisTime').textContent = '';
            currentResult = null;
            updateButtons(false);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = '✓ ' + message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 回车快捷键
        document.getElementById('requirementInput').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                analyze();
            }
        });
    </script>
</body>
</html>
